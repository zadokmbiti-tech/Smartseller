openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartStock AI - POS & Inventory Management API for Kenyan retailers
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog management
  - name: categories
    description: Product categories
  - name: inventory
    description: Stock tracking and adjustments
  - name: sales
    description: POS sales and transactions
  - name: suppliers
    description: Supplier records
  - name: purchase-orders
    description: Purchase order management
  - name: analytics
    description: Sales analytics and reporting
  - name: forecasting
    description: AI demand forecasting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CATEGORIES ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ─── PRODUCTS ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Look up product by barcode/SKU
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── INVENTORY / STOCK ─────────────────────────────────────────────────────
  /inventory/adjustments:
    get:
      operationId: listStockAdjustments
      tags: [inventory]
      summary: List stock adjustments/audit log
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of stock adjustments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockAdjustment"
    post:
      operationId: createStockAdjustment
      tags: [inventory]
      summary: Record a stock adjustment (damage, shrinkage, correction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockAdjustmentInput"
      responses:
        "201":
          description: Adjustment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAdjustment"

  /inventory/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [inventory]
      summary: Get products below their reorder level
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockAlert"

  /inventory/movements/{productId}:
    get:
      operationId: getProductStockMovements
      tags: [inventory]
      summary: Get stock movement history for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  # ─── SUPPLIERS ─────────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ─── PURCHASE ORDERS ───────────────────────────────────────────────────────
  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [purchase-orders]
      summary: List purchase orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, ordered, received, cancelled]
        - name: supplierId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [purchase-orders]
      summary: Create a purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderInput"
      responses:
        "201":
          description: Created purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [purchase-orders]
      summary: Get purchase order by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updatePurchaseOrder
      tags: [purchase-orders]
      summary: Update a purchase order
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePurchaseOrderInput"
      responses:
        "200":
          description: Updated purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}/receive:
    post:
      operationId: receivePurchaseOrder
      tags: [purchase-orders]
      summary: Mark purchase order as received and update stock
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Purchase order received, stock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  # ─── SALES / POS ───────────────────────────────────────────────────────────
  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List sales transactions
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: paymentMethod
          in: query
          schema:
            type: string
            enum: [cash, mpesa, bank]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleInput"
      responses:
        "201":
          description: Sale created, stock decremented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get sale by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          $ref: "#/components/responses/NotFound"

  /sales/daily-summary:
    get:
      operationId: getDailySalesSummary
      tags: [sales]
      summary: Get today's till summary / reconciliation
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummary"

  /sales/{id}/mpesa-status:
    get:
      operationId: getMpesaPaymentStatus
      tags: [sales]
      summary: Check M-Pesa STK push payment status
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: M-Pesa payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaStatus"

  /sales/mpesa/callback:
    post:
      operationId: mpesaCallback
      tags: [sales]
      summary: Daraja M-Pesa STK push callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Callback processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResultCode:
                    type: integer
                  ResultDesc:
                    type: string

  # ─── ANALYTICS ─────────────────────────────────────────────────────────────
  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: High-level dashboard metrics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
            default: month
      responses:
        "200":
          description: Overview metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/sales-trend:
    get:
      operationId: getSalesTrend
      tags: [analytics]
      summary: Sales trend over time (daily/weekly/monthly)
      parameters:
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesTrendPoint"

  /analytics/top-products:
    get:
      operationId: getTopProducts
      tags: [analytics]
      summary: Best and worst performing products by revenue and volume
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, year]
            default: month
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopProductsResult"

  /analytics/payment-breakdown:
    get:
      operationId: getPaymentBreakdown
      tags: [analytics]
      summary: Sales breakdown by payment method
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
            default: month
      responses:
        "200":
          description: Payment breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentBreakdownItem"

  /analytics/category-performance:
    get:
      operationId: getCategoryPerformance
      tags: [analytics]
      summary: Revenue and margin per category
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, year]
            default: month
      responses:
        "200":
          description: Category performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryPerformance"

  # ─── FORECASTING ───────────────────────────────────────────────────────────
  /forecasting/reorder-recommendations:
    get:
      operationId: getReorderRecommendations
      tags: [forecasting]
      summary: AI reorder recommendations (weighted moving average)
      responses:
        "200":
          description: Reorder recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReorderRecommendation"

  /forecasting/demand/{productId}:
    get:
      operationId: getProductDemandForecast
      tags: [forecasting]
      summary: Demand forecast for a specific product (next 30 days)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Demand forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemandForecast"

  /forecasting/stockout-risk:
    get:
      operationId: getStockoutRisk
      tags: [forecasting]
      summary: Products at risk of stocking out in the next 14 days
      responses:
        "200":
          description: Stockout risk list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockoutRisk"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    # ─── Categories ──────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    CreateCategoryInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    # ─── Products ────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
        sku:
          type: string
        barcode:
          type: string
          nullable: true
        name:
          type: string
        categoryId:
          type: integer
          nullable: true
        categoryName:
          type: string
          nullable: true
        costPrice:
          type: number
          format: float
        sellingPrice:
          type: number
          format: float
        stockQty:
          type: integer
        reorderLevel:
          type: integer
        unit:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - sku
        - name
        - costPrice
        - sellingPrice
        - stockQty
        - reorderLevel
        - unit
        - isActive
        - createdAt
        - updatedAt

    CreateProductInput:
      type: object
      properties:
        sku:
          type: string
        barcode:
          type: string
          nullable: true
        name:
          type: string
        categoryId:
          type: integer
          nullable: true
        costPrice:
          type: number
          format: float
        sellingPrice:
          type: number
          format: float
        stockQty:
          type: integer
          default: 0
        reorderLevel:
          type: integer
          default: 10
        unit:
          type: string
          default: pcs
      required:
        - sku
        - name
        - costPrice
        - sellingPrice

    # ─── Inventory ───────────────────────────────────────────────────────────
    StockAdjustment:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        adjustmentType:
          type: string
          enum: [damage, shrinkage, correction, opening_stock, return]
        quantityChange:
          type: integer
        quantityBefore:
          type: integer
        quantityAfter:
          type: integer
        reason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - productName
        - adjustmentType
        - quantityChange
        - quantityBefore
        - quantityAfter
        - createdAt

    CreateStockAdjustmentInput:
      type: object
      properties:
        productId:
          type: integer
        adjustmentType:
          type: string
          enum: [damage, shrinkage, correction, opening_stock, return]
        quantityChange:
          type: integer
        reason:
          type: string
          nullable: true
      required:
        - productId
        - adjustmentType
        - quantityChange

    LowStockAlert:
      type: object
      properties:
        productId:
          type: integer
        sku:
          type: string
        name:
          type: string
        stockQty:
          type: integer
        reorderLevel:
          type: integer
        deficit:
          type: integer
        categoryName:
          type: string
          nullable: true
      required:
        - productId
        - sku
        - name
        - stockQty
        - reorderLevel
        - deficit

    StockMovement:
      type: object
      properties:
        id:
          type: integer
        movementType:
          type: string
          enum: [sale, purchase, adjustment, return]
        quantityChange:
          type: integer
        quantityAfter:
          type: integer
        referenceId:
          type: integer
          nullable: true
        referenceType:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - movementType
        - quantityChange
        - quantityAfter
        - createdAt

    # ─── Suppliers ───────────────────────────────────────────────────────────
    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    CreateSupplierInput:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - name

    # ─── Purchase Orders ─────────────────────────────────────────────────────
    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
        supplierId:
          type: integer
        supplierName:
          type: string
        status:
          type: string
          enum: [draft, ordered, received, cancelled]
        totalAmount:
          type: number
          format: float
        notes:
          type: string
          nullable: true
        orderedAt:
          type: string
          format: date-time
          nullable: true
        receivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItem"
      required:
        - id
        - supplierId
        - supplierName
        - status
        - totalAmount
        - createdAt
        - items

    PurchaseOrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
